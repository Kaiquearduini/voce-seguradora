:root{
  color-scheme:light;
  --navy:#002430;--neon:#46EF80;--teal:#279989;
  --bluen:#000060;--bluel:#EAF4F7;
  --surf:#EAF4F7;--dark:#0D1B21;
  --txt1:#0D1B21;--txt2:#4A6572;--txt3:#8FAABB;
  /* legacy aliases — used throughout screens on dark backgrounds */
  --muted:rgba(255,255,255,.4);
  --gray:rgba(255,255,255,.55);
  --border:rgba(0,36,48,.07);
  --card-sh:0 2px 8px rgba(0,36,48,.06),0 8px 28px rgba(0,36,48,.05);
  --white:#fff;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{background:#0e1e27;font-family:'Cera Pro','Helvetica Neue',Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:32px 16px}
.phone{width:390px;height:844px;background:var(--navy);border-radius:48px;overflow:hidden;position:relative;flex-shrink:0;
  box-shadow:0 0 0 1px rgba(255,255,255,.04),0 0 0 10px #0b181f,0 0 0 11px rgba(0,0,0,.18),0 60px 120px rgba(0,0,0,.6),0 0 100px rgba(70,239,128,.08),inset 0 1px 0 rgba(255,255,255,.04)}
@media(max-width:480px){body{padding:0;background:#0e1e27;align-items:flex-start}.phone{width:100%;height:100dvh;border-radius:0;box-shadow:none}}

/* ── ACESSIBILIDADE (a11y) ── */
/* Anel de foco visível só para navegação por teclado (não atrapalha toque/mouse) */
:focus-visible{outline:3px solid #46EF80;outline-offset:2px;border-radius:8px}
*:focus:not(:focus-visible){outline:none}
/* Respeita "reduzir movimento" do sistema: corta transições/animações para quem precisa */
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important;scroll-behavior:auto!important}
}

/* ── SCREEN SYSTEM ── */
.scr{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transform:translateX(44px);transition:opacity .24s ease,transform .24s cubic-bezier(.4,0,.2,1);will-change:transform,opacity;overflow:hidden}
.scr.active{opacity:1;pointer-events:all;transform:translateX(0)}
.scr.out{opacity:0;transform:translateX(-44px);pointer-events:none}

/* ── STATUS BAR ── */
.sb{height:50px;padding:0 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sb-d .st{color:rgba(255,255,255,.92);font-size:15px;font-weight:700;letter-spacing:.01em}
.sb-d .si{color:rgba(255,255,255,.55);font-size:11px;letter-spacing:.06em}
.sb-l .st{color:rgba(0,0,0,.88);font-size:15px;font-weight:700;letter-spacing:.01em}
.sb-l .si{color:rgba(0,0,0,.5);font-size:11px;letter-spacing:.04em}

/* ── NAV BAR ── */
.nb{height:56px;padding:0 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.nb-btn{width:38px;height:38px;border-radius:12px;border:none;cursor:pointer;font-size:22px;line-height:1;display:flex;align-items:center;justify-content:center;font-family:inherit;transition:transform .1s,opacity .1s}
.nb-btn:active{transform:scale(.9);opacity:.7}
.nb-d{background:rgba(255,255,255,.09);color:rgba(255,255,255,.9)}
.nb-l{background:rgba(0,36,48,.06);color:var(--txt1)}
.nb-cancel{font-size:14px;font-weight:600;background:none;border:none;cursor:pointer;font-family:inherit;color:var(--txt3);padding:8px 4px;letter-spacing:.01em}

/* ── PROGRESS BAR ── */
.prog{height:2px;margin:0 24px 24px;background:rgba(255,255,255,.07);border-radius:2px;flex-shrink:0;overflow:hidden}
.prog-f{height:100%;background:linear-gradient(90deg,var(--teal),var(--neon));border-radius:2px;transition:width .45s cubic-bezier(.4,0,.2,1)}

/* ── STEP DOTS ── */
.step-dots{display:flex;gap:5px;align-items:center;padding:0 24px 22px;flex-shrink:0}
.step-dot{height:3px;border-radius:2px;background:rgba(255,255,255,.12);transition:all .32s cubic-bezier(.4,0,.2,1)}
.step-dot.done{background:rgba(70,239,128,.45)}
.step-dot.cur{background:var(--neon);flex:2.5}

/* ── BUTTONS ── */
.btn{width:100%;height:56px;border-radius:16px;border:none;font-size:16.5px;font-weight:800;cursor:pointer;font-family:inherit;letter-spacing:.01em;transition:transform .12s,box-shadow .12s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:active{transform:scale(.965)}
.btn:disabled{opacity:.25;cursor:not-allowed;transform:none!important}
.btn-neon{background:var(--neon);color:var(--navy);box-shadow:0 4px 20px rgba(70,239,128,.3)}
.btn-neon:active{box-shadow:0 2px 10px rgba(70,239,128,.2)}
.btn-navy{background:var(--navy);color:var(--neon)}
.btn-ol{background:transparent;border:1.5px solid rgba(70,239,128,.5);color:var(--neon);height:52px}
.btn-ol-t{background:transparent;border:1.5px dashed rgba(39,153,137,.5);color:var(--teal);height:52px}
.btn-ghost{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85);height:52px;border:1px solid rgba(255,255,255,.09)}

/* ── INPUTS (dark) ── */
.iw{background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.09);border-radius:16px;padding:15px 20px;cursor:text;transition:all .22s}
.iw:focus-within{border-color:rgba(70,239,128,.5);background:rgba(70,239,128,.04)}
.ilbl{font-size:10px;font-weight:800;color:rgba(70,239,128,.7);letter-spacing:.12em;text-transform:uppercase;margin-bottom:7px}
.inp{width:100%;background:none;border:none;outline:none;color:#fff;font-size:22px;font-weight:700;font-family:inherit;letter-spacing:-.01em}
.inp::placeholder{color:rgba(255,255,255,.18);font-weight:400;font-size:17px;letter-spacing:0}

/* ── SELECT OPTIONS ── */
.opt{display:flex;align-items:center;gap:14px;background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.08);border-radius:16px;padding:16px 18px;cursor:pointer;transition:all .16s;position:relative}
.opt:active{transform:scale(.985)}
.opt.sel{border-color:var(--neon);background:rgba(70,239,128,.06);box-shadow:0 0 0 4px rgba(70,239,128,.05)}
.opt-ico{width:46px;height:46px;border-radius:14px;background:rgba(70,239,128,.1);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .16s}
.opt.sel .opt-ico{background:rgba(70,239,128,.15)}
.opt-ico svg{width:22px;height:22px;color:var(--neon)}
.opt-info{flex:1}
.opt-name{font-size:15px;font-weight:700;color:#fff;letter-spacing:-.01em}
.opt-sub{font-size:12px;color:rgba(255,255,255,.38);margin-top:3px;line-height:1.4}
.opt-chk{width:22px;height:22px;border-radius:50%;border:2px solid rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .18s}
.opt.sel .opt-chk{background:var(--neon);border-color:var(--neon)}
.opt-chki{font-size:11px;font-weight:900;color:var(--navy);display:none}
.opt.sel .opt-chki{display:block}

/* ── INFO CHIPS ── */
.infr{display:flex;gap:11px;align-items:flex-start;padding:12px 14px;background:rgba(255,255,255,.035);border-radius:12px;border:1px solid rgba(255,255,255,.055)}
.infd{width:5px;height:5px;border-radius:50%;background:var(--teal);flex-shrink:0;margin-top:7px}
.inft{font-size:12.5px;color:rgba(255,255,255,.45);line-height:1.5}

/* ── SCROLL ── */
.scrl{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.scrl::-webkit-scrollbar{display:none}

/* ── PLAN TOGGLE ── */
.ptgl{display:flex;background:rgba(0,0,0,.18);border-radius:14px;padding:4px;gap:3px}
.ptab{flex:1;height:42px;border-radius:10px;border:none;font-size:13px;font-weight:700;color:rgba(255,255,255,.45);cursor:pointer;font-family:inherit;transition:all .25s cubic-bezier(.16,1,.3,1);background:transparent;letter-spacing:.01em}
.ptab.active{background:linear-gradient(135deg,#46EF80 0%,#279989 100%);color:#002430;box-shadow:0 2px 14px rgba(70,239,128,.35);}

/* ── TAB BAR ── */
.tbar{position:absolute;bottom:0;left:0;right:0;height:84px;background:rgba(255,255,255,.97);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid rgba(0,36,48,.06);display:flex;padding:10px 4px 0}
.ti{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:2px 0;transition:transform .14s}
.ti:active{transform:scale(.88)}
.ti-ico{width:24px;height:24px;transition:transform .22s}
.ti.active .ti-ico{transform:scale(1.08)}
.ti-lbl{font-size:10px;font-weight:700;color:var(--txt3);letter-spacing:.04em;text-transform:uppercase}
.ti.active .ti-lbl{color:var(--teal)}
.ti-pip{width:0;height:2.5px;border-radius:2px;background:linear-gradient(90deg,var(--neon),var(--teal));transition:width .25s cubic-bezier(.4,0,.2,1);margin-bottom:2px}
.ti.active .ti-pip{width:20px}

/* ── LIGHT CARDS ── */
.card-w{background:#fff;border-radius:20px;overflow:hidden;box-shadow:var(--card-sh);border:1px solid var(--border)}
.card-w-top{height:3px;background:linear-gradient(90deg,var(--neon) 0%,var(--teal) 100%)}

/* ── POLICY CARD (new premium) ── */
.pol-card{background:#fff;border-radius:20px;border:1px solid var(--border);box-shadow:var(--card-sh);overflow:hidden;margin-bottom:12px;transition:transform .14s}
.pol-card:active{transform:scale(.985)}

/* ── SECURITY BADGE ── */
.sec-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(70,239,128,.08);border:1px solid rgba(70,239,128,.18);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;color:var(--neon);letter-spacing:.02em}

/* ── PAYMENT CARD 3D ── */
.pcard-scene{perspective:1200px;height:180px;margin:0 24px 24px}
.pcard{width:100%;height:180px;position:relative;transform-style:preserve-3d;transition:transform .7s cubic-bezier(.4,0,.2,1)}
.pcard.flip{transform:rotateY(180deg)}
.pcard-f,.pcard-b{position:absolute;inset:0;border-radius:22px;backface-visibility:hidden;padding:24px;display:flex;flex-direction:column}
.pcard-f{background:linear-gradient(135deg,#002430 0%,#083548 55%,#002e3d 100%);box-shadow:0 8px 32px rgba(0,0,0,.4)}
.pcard-b{background:linear-gradient(135deg,#083548 0%,#002430 100%);transform:rotateY(180deg);box-shadow:0 8px 32px rgba(0,0,0,.4)}

/* ── ANIMATIONS ── */
@keyframes shieldIn{0%{transform:scale(0) rotate(-18deg);opacity:0}60%{transform:scale(1.1) rotate(3deg)}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes fadeUp{from{transform:translateY(28px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideUpFull{from{transform:translateY(115%)}to{transform:translateY(0)}}
@keyframes blobPulse{0%,100%{transform:scale(1) rotate(0deg);opacity:.8}33%{transform:scale(1.08) rotate(3deg)}66%{transform:scale(.94) rotate(-2deg);opacity:1}}
@keyframes pulseGlow{0%,100%{filter:drop-shadow(0 0 18px rgba(70,239,128,.45));transform:scale(1)}50%{filter:drop-shadow(0 0 48px rgba(70,239,128,.8));transform:scale(1.04)}}
@keyframes vFloat{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-9px) rotate(-1.5deg)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scrollHintBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(5px)}}
@keyframes tdot{0%,80%,100%{transform:translateY(0);opacity:.35}40%{transform:translateY(-4px);opacity:1}}
.tdot{width:7px;height:7px;border-radius:50%;background:#279989;display:inline-block;animation:tdot 1.1s infinite ease-in-out}
.sp-v{animation:vFloat 3.6s ease-in-out infinite;will-change:transform}
@keyframes pulseD{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.75)}}
@keyframes checkIn{0%{transform:scale(0);opacity:0}60%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes timerOut{from{stroke-dashoffset:0}to{stroke-dashoffset:251}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes particle{0%{transform:translate(0,0) scale(1);opacity:.85}100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.pg{animation:pulseGlow 2.8s ease-in-out infinite}
.ci{animation:checkIn .5s cubic-bezier(.34,1.56,.64,1) both}

.skel{background:linear-gradient(90deg,rgba(0,36,48,.06) 25%,rgba(0,36,48,.12) 50%,rgba(0,36,48,.06) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px}
.skel-dark{background:linear-gradient(90deg,rgba(255,255,255,.06) 25%,rgba(255,255,255,.1) 50%,rgba(255,255,255,.06) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px}
</style>
<style id="polish">
/* ===== Camada de polimento (UX) ===== */
.btn{position:relative;overflow:hidden}
.btn:active{transform:scale(.975)}
.btn-neon:active{box-shadow:0 1px 6px rgba(70,239,128,.18)}
.btn:disabled{opacity:.45;cursor:not-allowed}
/* efeito ripple ao toque */
.rpl{position:absolute;border-radius:50%;transform:scale(0);background:rgba(255,255,255,.35);pointer-events:none;animation:rpl .55s ease-out}
.btn-neon .rpl{background:rgba(0,36,48,.18)}
@keyframes rpl{to{transform:scale(2.6);opacity:0}}
/* foco acessível (sem caixa em volta ao clicar) */
button:focus-visible,a:focus-visible{outline:2px solid rgba(70,239,128,.7);outline-offset:2px}
/* transição de tela um pouco mais suave */
.scr{transition:opacity .26s ease,transform .30s cubic-bezier(.22,.61,.36,1)}
.scr.out{opacity:0;transform:translateX(-28px);pointer-events:none}
/* barra de abas: item ativo com leve realce */
.ti{transition:transform .15s ease}
.ti:active{transform:scale(.92)}
.ti.active .ti-ico{transform:translateY(-1px)}
/* cartões tocáveis: feedback consistente */
.pol-card:active,[data-cid]:active,[data-pid]:active{transform:scale(.985)}
/* feedback de toque universal em linhas, chips, abas e ações */
[data-a]:not(.btn):not(.nb-btn):not(.nb-cancel):active,[data-nav]:active,[data-chip]:active,[data-tab]:active{opacity:.6;transition:opacity .04s}
.ti{cursor:pointer}
/* skeleton shimmer reutilizável */
.skel{background:linear-gradient(90deg,rgba(0,36,48,.06) 25%,rgba(0,36,48,.12) 37%,rgba(0,36,48,.06) 63%);background-size:400% 100%;animation:shimmer 1.4s ease infinite;border-radius:12px}
@keyframes shimmer{0%{background-position:100% 0}100%{background-position:0 0}}
/* respeita quem prefere menos animação */
@media (prefers-reduced-motion: reduce){*{animation-duration:.001ms!important;transition-duration:.001ms!important}}
</style>
</head>

function _validField(key,val,cfg){
  const v=(val||'').trim();
  if(!v) return {ok:false,msg:'Preencha este campo para continuar.'};
  if(key==='cpf'){ if(_digits(v).length!==11) return {ok:false,msg:'Informe um CPF válido (11 dígitos).'}; }
  else if(key.indexOf('cep')>=0){ if(_digits(v).length!==8) return {ok:false,msg:'Informe um CEP válido (8 dígitos).'}; }
  else if(key==='wa'||key.indexOf('tel')>=0||key.indexOf('whats')>=0){ const d=_digits(v); if(d.length<10||d.length>11) return {ok:false,msg:'Informe um WhatsApp válido com DDD.'}; }
  else if(key==='placa'){ const p=v.toUpperCase().replace(/[^A-Z0-9]/g,''); if(!/^[A-Z]{3}[0-9][A-Z0-9][0-9]{2}$/.test(p)) return {ok:false,msg:'Informe uma placa válida (ex.: ABC1D23).'}; }
  else if(/(valor|capital|renda|aluguel|bens)/.test(key)){ const n=_brlNum(v); if(n<=0) return {ok:false,msg:'Informe um valor maior que zero.'}; if(cfg&&cfg.min&&n<cfg.min) return {ok:false,msg:'Valor mínimo: '+_fmtMax(cfg.min)+'.'}; if(cfg&&cfg.max&&n>cfg.max) return {ok:false,msg:'Valor máximo permitido: '+_fmtMax(cfg.max)+'.'}; }
  else { if(v.length<2) return {ok:false,msg:'Preencha este campo para continuar.'}; }
  return {ok:true};
}

function _kwHit(t,kw){ if(kw.indexOf(' ')<0&&kw.length<=4)return new RegExp('(^|[^a-z0-9])'+kw+'([^a-z0-9]|$)').test(t); return t.indexOf(kw)>=0; }
function botReply(q){
  const t=(q||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const nome=((S.form&&S.form.name)||'').split(' ')[0];
  const c={nome:nome,pols:(S.policies||[])};
  const R=(text,actions,topic)=>({text:text,actions:actions||[],topic:topic||''});
  let best=null,bestScore=0;
  for(const e of CHAT_KB){ let s=0; for(const kw of e.k){ if(_kwHit(t,kw))s+=kw.split(' ').length; } if(s>bestScore){bestScore=s;best=e;} }
  if(best&&bestScore>0){
    const text=typeof best.a==='function'?best.a(c):best.a;
    const act=typeof best.act==='function'?best.act(c):(best.act||[]);
    return R(text,act,best.topic||'');
  }
  return R('Posso te ajudar com vários assuntos: o que é franquia, carência, cobertura e vigência; como abrir um sinistro e receber a indenização; formas de pagamento; como contratar, renovar ou cancelar; e os detalhes de cada seguro (auto, celular, casa, vida, cartão, PIX e mais). Sobre qual deles você quer saber? Se preferir, posso te encaminhar para um atendente.',[{label:'Ver os seguros',nav:'cats'},{label:'Falar com atendente',nav:'sinistro'}],'fallback');
}

async function fetchProfile(){
  const u=await currentUser(); if(!u)return null;
  return Object.assign({}, u.user_metadata||{});
}
function applyProfile(p){ if(!p)return; S.profile=p; if(p.nome)S.form.name=p.nome; if(p.cpf)S.form.cpf=p.cpf; if(p.telefone&&!S.form.wa)S.form.wa=p.telefone; if(p.nascimento&&!S.form.nascimento)S.form.nascimento=p.nascimento; }
async function saveProfile(fields){
  if(!SB)return{error:{message:'failed to fetch'}};
  try{
    const u=await currentUser(); if(!u)return{error:{message:'Faça login primeiro.'}};
    const merged=Object.assign({}, (u&&u.user_metadata)||{}, fields);
    const {data,error}=await SB.auth.updateUser({data:merged});
    if(!error)applyProfile(merged);
    return {data,error};
  }catch(e){return {error:{message:String((e&&e.message)||e)}};}
}
let _contaFetched=false;
function refreshConta(){
  if(_contaFetched)return;_contaFetched=true;
  fetchProfile().then(p=>{ if(p){applyProfile(p); if(S.scr==='conta')goTo('conta',rConta()); if(S.scr==='home')goTo('home',rHome());} });
}
function mapRowToCard(r){
  let icon='shield';
  try{const prod=Object.values(PRODS).find(p=>p.name===r.tipo);if(prod)icon=prod.icon;}catch(e){}
  return {type:r.tipo,icon:icon,item:r.item||'',price:r.preco||'',cov:r.cobertura||'',accent:'#279989',rgb:'39,153,137'};
}
function refreshHomePolicies(){
  if(_homeFetched)return; _homeFetched=true;
  currentUser().then(u=>{
    if(!u){ if(S.scr==='home')goTo('home',rHome()); return; }
    return Promise.all([fetchProfile(),loadPolicies()]).then(([prof,rows])=>{
      applyProfile(prof);
      S.policies=rows.map(mapRowToCard);
      if(S.scr==='home')goTo('home',rHome());
    });
  }).catch(()=>{ if(S.scr==='home')goTo('home',rHome()); });
}
function traduzErro(m){
  m=(m||'').toLowerCase();
  if(m.includes('invalid login')||m.includes('invalid credentials'))return 'E-mail ou senha incorretos.';
  if(m.includes('already registered')||m.includes('already been registered')||m.includes('user already'))return 'Esse e-mail já tem conta. Tente entrar.';
  if(m.includes('email not confirmed'))return 'Confirme seu e-mail antes de entrar.';
  if(m.includes('password')&&m.includes('6'))return 'A senha precisa ter ao menos 6 caracteres.';
  if(m.includes('failed to fetch')||m.includes('network')||m.includes('fetch'))return 'Sem conexão com o servidor. Verifique a internet e tente de novo.';
  if(m.includes('rate limit')||m.includes('too many'))return 'Muitas tentativas. Aguarde um pouco e tente de novo.';
  return 'Não foi possível concluir. ('+m+')';
}

function maskMoney(v){
  v=v.replace(/\D/g,'');
  if(!v)return '';
  const n=parseInt(v)/100;
  return 'R$ '+n.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
}

function splashInit(el){
  // ── Canvas particles ──
  const canvas=el.querySelector('#sp-canvas');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  let W=canvas.offsetWidth,H=canvas.offsetHeight;
  canvas.width=W*devicePixelRatio;canvas.height=H*devicePixelRatio;
  ctx.scale(devicePixelRatio,devicePixelRatio);
  const cols=['#46EF80','#279989','rgba(70,239,128,.6)','rgba(39,153,137,.5)'];
  const pts=Array.from({length:55},()=>({
    x:Math.random()*W, y:H+Math.random()*H*0.4,
    r:Math.random()*2.5+1, vx:(Math.random()-.5)*.35,
    vy:-(Math.random()*0.6+0.25), op:Math.random()*.7+.2,
    col:cols[Math.floor(Math.random()*cols.length)], delay:Math.random()*2000
  }));
  let start=null,raf;
  function drawParticles(ts){
    if(!start)start=ts;
    const elapsed=ts-start;
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{
      if(elapsed<p.delay)return;
      p.x+=p.vx; p.y+=p.vy;
      if(p.y<-20){p.y=H+10;p.x=Math.random()*W;}
      ctx.save();
      ctx.globalAlpha=p.op*(Math.min(elapsed-p.delay,500)/500);
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=p.col;
      ctx.shadowColor=p.col;
      ctx.shadowBlur=6;
      ctx.fill();
      ctx.restore();
    });
    raf=requestAnimationFrame(drawParticles);
  }
  raf=requestAnimationFrame(drawParticles);

  // ── Shield ring entrance ──
  const ring=el.querySelector('#sp-ring');
  const arc=el.querySelector('#sp-arc');
  setTimeout(()=>{
    ring.style.opacity='1';
    ring.style.transition='opacity .4s ease, transform .85s cubic-bezier(.34,1.4,.64,1)';
    ring.style.transform='scale(1)';
  },200);
  setTimeout(()=>{if(arc)arc.style.strokeDashoffset='0';},400);

  // ── Typewriter ──
  const t1=el.querySelector('#sp-t1');
  const cur=el.querySelector('#sp-cur');
  const full='VOCÊ SEGURADORA';
  let idx=0;
  function type(){
    if(!t1)return;
    if(idx<=full.length){
      t1.textContent=full.slice(0,idx);
      idx++;
      setTimeout(type, idx<=4?100:idx<=5?160:65);
    } else {
      setTimeout(()=>{if(cur)cur.style.display='none';},500);
      // tagline
      const tag=el.querySelector('#sp-tag');
      if(tag){tag.style.opacity='1';}
      // sheet
      setTimeout(()=>{
        const sh=el.querySelector('#sp-sheet');
        if(sh)sh.style.transform='translateY(0)';
      },800);
    }
  }
  setTimeout(type,900);

  // cleanup on navigate
  el.addEventListener('remove',()=>cancelAnimationFrame(raf));
}

function fmtBRL(n){return 'R$ '+Number(n||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtBRL0(n){return 'R$ '+Number(n||0).toLocaleString('pt-BR',{maximumFractionDigits:0});}
const RES_STEPS=['dados','perfil','local','elig','modalidade','lmi','vigencia','cobs','quest','assist','revisao'];
function resSteps(){ return S.authed?RES_STEPS.filter(s=>s!=='dados'):RES_STEPS; }
function maskCPF(v){v=(v||'').replace(/\D/g,'').slice(0,11);if(v.length>9)return v.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/,'$1.$2.$3-$4');if(v.length>6)return v.replace(/(\d{3})(\d{3})(\d{1,3})/,'$1.$2.$3');if(v.length>3)return v.replace(/(\d{3})(\d{1,3})/,'$1.$2');return v;}
function maskTel(v){v=(v||'').replace(/\D/g,'').slice(0,11);if(v.length>10)return v.replace(/(\d{2})(\d{5})(\d{1,4})/,'($1) $2-$3');if(v.length>6)return v.replace(/(\d{2})(\d{4,5})(\d{1,4})/,'($1) $2-$3');if(v.length>2)return v.replace(/(\d{2})(\d{1,5})/,'($1) $2');if(v.length>0)return '('+v;return v;}
function resRerender(){
  try{
    const cur=document.querySelector('#app .scr.active');
    if(!cur){ nav(S.scr||'resid'); return; }
    const curScrl=cur.querySelector('.scrl'); const y=curScrl?curScrl.scrollTop:0;
    const fn=(S.scr==='endosso')?rEndosso:rResid;
    const wr=document.createElement('div'); wr.innerHTML=fn();
    const neu=wr.firstElementChild; neu.classList.add('active');
    cur.replaceWith(neu);
    const neuScrl=neu.querySelector('.scrl'); if(neuScrl)neuScrl.scrollTop=y;
    bind(neu);
  }catch(e){ nav(S.scr||'resid'); }
}

}
function resSavePending(){
  try{
    if(S.authed) return;
    if(!S.res||_digits(S.res.cpf).length<11) return;
    const q=resPremio();
    const d=new Date(Date.now()+7*864e5); const validade=('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2)+'/'+d.getFullYear();
    const snap={type:'Seguro Residencial',icon:'house',item:((RES.tiposImovel.find(t=>t.v===S.res.tipo)||{}).n)||'Residência',price:fmtBRL(q.mensal)+'/mês',cov:fmtBRL0(S.res.lmi),validade:validade,planLabel:'Mensal',res:Object.assign({},S.res)};
    const cpf=_digits(S.res.cpf), ph=_digits(S.res.wa);
    _writePending(_readPending().filter(x=>!(x.status==='cotacao'&&x.prod==='casa'&&((cpf&&_digits(x.cpf)===cpf)||(ph&&_digits(x.phone)===ph)))));
    addPendingQuote(S.res.email||'', S.res.cpf||'', S.res.wa||'', {prod:'casa',plan:'mensal',form:{email:S.res.email,cpf:S.res.cpf,wa:S.res.wa,cep:S.res.cep},snap:snap});
  }catch(e){}
}
function resPremio(){
  const r=S.res; let txa=RES.basica.txa;
  RES.adicionais.forEach(c=>{if(r.cobs[c.id])txa+=c.txa;});
  let anual=r.lmi*txa;
  const ft=RES.franquiaTipos.find(f=>f.v===r.franquia)||{fator:1}; anual*=ft.fator;
  if(r.quest.solar&&r.cobs[3])anual*=RES.questionario.solarCoef;
  if(r.quest.sin)anual*=RES.questionario.sinistroCoef;
  if(r.cobs[9]&&r.quest.prot.length){anual*=Math.max(0.90,1-0.02*r.quest.prot.length);}
  const vg=RES.vigencias.find(v=>v.v===r.vig)||{fator:1}; anual*=vg.fator;
  let mensal=anual/12;
  const as=RES.assist.find(a=>a.v===r.assist); if(as)mensal+=as.preco;
  const pt=RES.pet.find(p=>p.v===r.pet); if(pt)mensal+=pt.preco;
  return {mensal:mensal,anual:mensal*12};
}

function generateQR(){
  // Generate realistic-looking QR code SVG (fake but visually convincing)
  const s=21;const cell=8;
  let rects='';
  // Fixed finder patterns
  const fp=(ox,oy)=>{
    rects+=`<rect x="${ox*cell}" y="${oy*cell}" width="${7*cell}" height="${7*cell}" fill="#141416" rx="2"/>`;
    rects+=`<rect x="${(ox+1)*cell}" y="${(oy+1)*cell}" width="${5*cell}" height="${5*cell}" fill="white" rx="1"/>`;
    rects+=`<rect x="${(ox+2)*cell}" y="${(oy+2)*cell}" width="${3*cell}" height="${3*cell}" fill="#141416" rx="1"/>`;
  };
  fp(0,0);fp(14,0);fp(0,14);
  // Timing patterns
  for(let i=8;i<13;i++){if(i%2===0){rects+=`<rect x="${i*cell}" y="${6*cell}" width="${cell}" height="${cell}" fill="#141416"/>`;rects+=`<rect x="${6*cell}" y="${i*cell}" width="${cell}" height="${cell}" fill="#141416"/>`;}}
  // Data modules (deterministic from seed)
  let seed=12345;
  for(let y=0;y<s;y++){for(let x=0;x<s;x++){
    if((x<8&&y<8)||(x>12&&y<8)||(x<8&&y>12))continue;
    if(x===6||y===6)continue;
    seed=(seed*1103515245+12345)&0x7fffffff;
    if(seed%2===0)rects+=`<rect x="${x*cell}" y="${y*cell}" width="${cell}" height="${cell}" fill="#141416"/>`;
  }}
  const sz=s*cell;
  return`<svg viewBox="0 0 ${sz+16} ${sz+16}" style="width:220px;height:220px" xmlns="http://www.w3.org/2000/svg"><rect width="${sz+16}" height="${sz+16}" fill="white" rx="4"/><g transform="translate(8,8)">${rects}</g></svg>`;
}

function detectBrand(num){
  num=num.replace(/\s/g,'');
  if(/^4/.test(num))return'VISA';
  if(/^5[1-5]/.test(num))return'MASTERCARD';
  if(/^636/.test(num))return'ELO';
  if(/^3[47]/.test(num))return'AMEX';
  return'';
}

function generateBarcode(){
  let bars='';let x=0;
  const pattern=[3,2,1,2,1,2,3,1,2,1,3,1,2,2,1,2,1,3,1,2,2,1,3,2,1,2,1,3,2,1,2,1,2,3,1,2,1,2,1,3,2,2,1,2,3,1,2,1,2,2,1,3,1,2,1,2,2,3,1,2,1];
  pattern.forEach((w,i)=>{if(i%2===0)bars+=`<rect x="${x}" y="0" width="${w*3}" height="60" fill="#141416"/>`;x+=w*3;});
  return`<svg viewBox="0 0 ${x} 60" style="width:100%;height:60px" xmlns="http://www.w3.org/2000/svg"><rect width="${x}" height="60" fill="white"/>${bars}</svg>`;
}

// ===================== NAVIGATION =====================
function goTo(id,html){
  if(id!=='home')_homeFetched=false;
  if(id!=='conta')_contaFetched=false;
  const app=document.getElementById('app');
  const prev=app.querySelector('.scr.active');
  const wr=document.createElement('div');
  wr.innerHTML=html;
  const el=wr.firstElementChild;
  app.appendChild(el);
  if(prev){prev.classList.remove('active');prev.classList.add('out');setTimeout(()=>prev.remove(),280)}
  requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add('active')));
  S.scr=id;
  bind(el);
}

function nav(id){
  switch(id){
    case 'splash':     goTo('splash',rSplash()); break;
    case 'onboarding': goTo('onboarding',rOnboarding()); break;
    case 'resid':      goTo('resid',rResid()); break;
    case 'login':      goTo('login',rLogin()); break;
    case 'faceid-prompt': goTo('faceid-prompt',rFaceidPrompt()); break;
    case 'cadastro':   goTo('cadastro',rCadastro()); break;
    case 'apolice':    goTo('apolice',rApoliceDetail()); break;
    case 'endosso':    goTo('endosso',rEndosso()); break;
    case 'cancelar-apolice': goTo('cancelar-apolice',rCancelarApolice()); break;
    case 'sinistro':   goTo('sinistro',rSinistro()); break;
    case 'sinistro-detalhe': goTo('sinistro-detalhe',rSinistroDetalhe()); break;
    case 'sinistro-confirm': goTo('sinistro-confirm',rSinistroConfirm()); break;
    case 'termos':     goTo('termos',rTermos()); break;
    case 'pay-error':  goTo('pay-error',rPayError()); break;
    case 'cats':       goTo('cats',rCats()); break;
    case 'result':     goTo('result',rResult()); break;
    case 'payment':    goTo('payment',rPayment()); break;
    case 'pay-pix':    goTo('pay-pix',rPayPix()); break;
    case 'pay-card':   goTo('pay-card',rPayCard()); break;
    case 'pay-boleto': goTo('pay-boleto',rPayBoleto()); break;
    case 'success':    goTo('success',rSuccess()); break;
    case 'home':       goTo('home',rHome()); break;
    case 'indicacoes': goTo('indicacoes',rIndicacoes()); break;
    case 'como-indicacao': goTo('como-indicacao',rComoIndicacao()); break;
    case 'conta':      goTo('conta',rConta()); break;
    case 'perfil':     goTo('perfil',rPerfil()); break;
    case 'chat':       goTo('chat',rChat()); break;
    case 'privacy':    goTo('privacy',rPrivacy()); break;
    case 'terms':      goTo('terms',rTerms()); break;
    case 'delete-account': goTo('delete-account',rDeleteAccount()); break;
    case 'change-password': goTo('change-password',rChangePassword()); break;
    case 'forgot-password': goTo('forgot-password',rForgotPassword()); break;
    case 'reset-password':  goTo('reset-password',rResetPassword()); break;
    case 'loading':    goTo('loading',rLoading()); startLoad(); break;
    default:
      if(id.startsWith('prods-'))goTo(id,rProds(id.slice(6)));
      else if(id.startsWith('f-')){
        const sk=id.slice(2);
        const cfg=FC[sk];
        if(cfg?.type==='sel')goTo(id,rFormSel(sk));
        else if(cfg)goTo(id,rFormTxt(sk));
      }
  }
}

function startLoad(){
  [0,1,2].forEach(i=>setTimeout(()=>{
    const el=document.getElementById('lck'+i);
    if(el){el.innerHTML='✓';el.style.background='#46EF80';el.style.color='var(--navy)';el.style.borderColor='#46EF80';}
  },(i+1)*700+200));
  setTimeout(()=>nav('result'),2800);
}

// Campos pessoais reaproveitáveis: se o usuário está logado e já temos o dado, pulamos o passo
const REUSABLE_FIELDS=['cpf','wa','nascimento'];
function _personalVal(key){
  if(!S.authed)return '';
  const p=S.profile||{};
  if(key==='cpf')return p.cpf||S.userCpf||S.form.cpf||'';
  if(key==='wa')return p.telefone||S.userPhone||S.form.wa||'';
  if(key==='nascimento')return p.nascimento||S.form.nascimento||'';
  return '';
}
function _canSkip(key){ return REUSABLE_FIELDS.indexOf(key)>=0 && !!_personalVal(key); }
function _seedPersonal(){ REUSABLE_FIELDS.forEach(k=>{ const v=_personalVal(k); if(v)S.form[k]=v; }); }
function formGoStep(idx){
  const flow=gFlow();
  while(idx<flow.length && _canSkip(flow[idx])){ S.form[flow[idx]]=_personalVal(flow[idx]); idx++; }
  if(idx<flow.length){ S.step=idx; nav('f-'+flow[idx]); }
  else { S.step=0; nav('loading'); }
}
function formNextStep(sk){
  const flow=gFlow();
  const idx=flow.indexOf(sk);
  formGoStep(idx+1);
}
function formBack(){
  const flow=gFlow();
  let i=S.step-1;
  while(i>=0 && _canSkip(flow[i])) i--;
  if(i<0){ S.step=0; nav('prods-'+S.cat); }
  else { S.step=i; nav('f-'+flow[i]); }
}

function bind(el){
  if(S.scr==='splash')splashInit(el);
  if(S.scr==='home')refreshHomePolicies();
  if(S.scr==='home'){
    const _scrl=el.querySelector('.scrl');const _hd=el.querySelector('[data-home-header]');
    if(_scrl&&_hd)_scrl.addEventListener('scroll',()=>{_hd.style.boxShadow=_scrl.scrollTop>8?'0 8px 26px rgba(0,0,0,.22)':'none';},{passive:true});
  }
  // Seta "role para ver mais": aparece só quando há conteúdo abaixo e some no fim
  const _hint=el.querySelector('#res-scroll-hint');
  if(_hint){
    const _sc=el.querySelector('.scrl');
    if(_sc){
      const _upd=()=>{ const more=(_sc.scrollHeight-_sc.clientHeight-_sc.scrollTop>14)&&(_sc.scrollHeight>_sc.clientHeight+14); _hint.style.opacity=more?'1':'0'; };
      _sc.addEventListener('scroll',_upd,{passive:true});
      setTimeout(_upd,80); setTimeout(_upd,360);
    }
  }

  if(S.scr==='conta')refreshConta();

  // ── EXCLUIR CONTA ──
  const btnDel=el.querySelector('#btn-confirm-delete');
  if(btnDel){
    btnDel.addEventListener('click',async()=>{
      btnDel.textContent='Processando...';btnDel.disabled=true;
      await deleteAccountData();
      await authLogout();
      S.authed=false;S.policies=[];S.form={};S.profile=null;S.chat=null;S.userEmail=null;S.userCpf=null;S.userPhone=null;_homeFetched=false;_contaFetched=false;try{localStorage.removeItem('vs_chat');}catch(e){}
      nav('splash');
      setTimeout(()=>toast('Pedido de exclusão registrado.'),400);
    });
  }

  // ── ALTERAR SENHA (logado) ──
  const btnCP=el.querySelector('#btn-changepass');
  if(btnCP){
    const m=el.querySelector('#cp-msg');
    btnCP.addEventListener('click',async()=>{
      const atual=el.querySelector('#cp-atual')?.value||'';
      const nova=el.querySelector('#cp-nova')?.value||'';
      const conf=el.querySelector('#cp-conf')?.value||'';
      const err=t=>{if(m){m.style.color='#ff6b6b';m.textContent=t;}};
      if(!atual||!nova){return err('Preencha a senha atual e a nova.');}
      if(nova.length<6){return err('A nova senha precisa ter ao menos 6 caracteres.');}
      if(nova!==conf){return err('A confirmação não confere com a nova senha.');}
      const u=await currentUser();const email=u&&u.email;
      if(!email){return err('Sessão expirada. Entre novamente.');}
      btnCP.disabled=true;const old=btnCP.textContent;btnCP.textContent='Salvando...';if(m)m.textContent='';
      const {error}=await changePassword(email,atual,nova);
      if(error){err(error.message.includes('atual')?'Senha atual incorreta.':traduzErro(error.message));btnCP.disabled=false;btnCP.textContent=old;return;}
      btnCP.textContent='✓ Senha alterada!';
      if(m){m.style.color='#46EF80';m.textContent='Senha atualizada com sucesso.';}
      setTimeout(()=>nav('conta'),1100);
    });
  }

  // ── ESQUECI A SENHA (envia e-mail) ──
  const btnFP=el.querySelector('#btn-forgot');
  if(btnFP){
    const m=el.querySelector('#fp-msg');
    btnFP.addEventListener('click',async()=>{
      const email=(el.querySelector('#fp-email')?.value||'').trim();
      if(!emailValido(email)){if(m){m.style.color='#ff6b6b';m.textContent='Digite um e-mail válido.';}return;}
      btnFP.disabled=true;const old=btnFP.textContent;btnFP.textContent='Enviando...';if(m)m.textContent='';
      const {error}=await sendReset(email);
      if(error){if(m){m.style.color='#ff6b6b';m.textContent=traduzErro(error.message);}btnFP.disabled=false;btnFP.textContent=old;return;}
      btnFP.textContent='✓ Enviado!';
      if(m){m.style.color='#46EF80';m.textContent='Se este e-mail tiver conta, enviamos um link para criar uma nova senha. Verifique sua caixa de entrada e o spam.';}
    });
  }

  // ── REDEFINIR SENHA (após link do e-mail) ──
  const btnRP=el.querySelector('#btn-resetpass');
  if(btnRP){
    const m=el.querySelector('#rp-msg');
    btnRP.addEventListener('click',async()=>{
      const nova=el.querySelector('#rp-nova')?.value||'';
      const conf=el.querySelector('#rp-conf')?.value||'';
      const err=t=>{if(m){m.style.color='#ff6b6b';m.textContent=t;}};
      if(nova.length<6){return err('A senha precisa ter ao menos 6 caracteres.');}
      if(nova!==conf){return err('As senhas não conferem.');}
      btnRP.disabled=true;const old=btnRP.textContent;btnRP.textContent='Salvando...';if(m)m.textContent='';
      const {error}=await setNewPassword(nova);

      if(m){m.style.color='#46EF80';m.textContent='Pronto! Sua nova senha está ativa.';}
      S.recovery=false;
      setTimeout(()=>nav('home'),1100);
    });
  }

  // ── EDITAR PERFIL ──
  const btnPerfil=el.querySelector('#btn-perfil');
  if(btnPerfil){
    const pfMsg=el.querySelector('#pf-msg');
    const cpfEl=el.querySelector('#pf-cpf');
    if(cpfEl)cpfEl.addEventListener('input',()=>{let x=cpfEl.value.replace(/\D/g,'').slice(0,11);x=x.replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d{1,2})$/,'$1-$2');cpfEl.value=x;});
    const cepEl=el.querySelector('#pf-cep');
    if(cepEl)cepEl.addEventListener('input',async()=>{
      let raw=cepEl.value.replace(/\D/g,'').slice(0,8);
      cepEl.value=raw.replace(/(\d{5})(\d)/,'$1-$2');
      if(raw.length===8){
        if(pfMsg){pfMsg.style.color='rgba(255,255,255,.5)';pfMsg.textContent='Buscando endereço...';}
        try{
          const r=await fetch('https://viacep.com.br/ws/'+raw+'/json/');
          const d=await r.json();
          if(d&&!d.erro){
            const set=(id,val)=>{const e=el.querySelector('#'+id);if(e&&val)e.value=val;};
            set('pf-end',d.logradouro);set('pf-bairro',d.bairro);set('pf-cidade',d.localidade);set('pf-uf',d.uf);
            if(pfMsg){pfMsg.style.color='#46EF80';pfMsg.textContent='Endereço encontrado!';}
            el.querySelector('#pf-num')?.focus();
          }else{ if(pfMsg)pfMsg.textContent=''; }
        }catch(e){ if(pfMsg)pfMsg.textContent=''; }
      }
    });
    const telEl=el.querySelector('#pf-tel');
    if(telEl)telEl.addEventListener('input',()=>{let x=telEl.value.replace(/\D/g,'').slice(0,11);if(x.length>10)x=x.replace(/(\d{2})(\d{5})(\d{4})/,'($1) $2-$3');else if(x.length>6)x=x.replace(/(\d{2})(\d{4,5})(\d*)/,'($1) $2-$3');else if(x.length>2)x=x.replace(/(\d{2})(\d+)/,'($1) $2');telEl.value=x;});
    const ufEl=el.querySelector('#pf-uf');
    if(ufEl)ufEl.addEventListener('input',()=>{ufEl.value=ufEl.value.toUpperCase().replace(/[^A-Z]/g,'').slice(0,2);});

    const inp=el.querySelector('#finp');
    if(inp){
      if(cfg?.mask)inp.addEventListener('input',()=>{inp.value=cfg.mask(inp.value)});
      inp.addEventListener('keydown',e=>{if(e.key==='Enter')btnFN.click();});
      setTimeout(()=>inp.focus(),150);
    }
    btnFN.addEventListener('click',()=>{
      if(inp&&cfg){ const r=_validField(cfg.key,inp.value,cfg); const m=el.querySelector('#finp-msg'); if(!r.ok){ if(m)m.textContent=r.msg; inp.style.borderColor='#ff6b6b'; inp.focus(); return; } if(m)m.textContent=''; S.form[cfg.key]=inp.value; }
      formNextStep(sk);
    });
  }

  // Select form
  const btnSN=el.querySelector('#btn-snext');
  if(btnSN){
    const sk=btnSN.dataset.sk;
    el.querySelectorAll('[data-sv]').forEach(o=>o.addEventListener('click',()=>{
      const v=o.dataset.sv;
      S.form[sk]=v;
      el.querySelectorAll('[data-sv]').forEach(x=>x.classList.remove('sel'));
      o.classList.add('sel');
      btnSN.removeAttribute('disabled');
    }));
    btnSN.addEventListener('click',()=>formNextStep(sk));
  }

  // Card payment
  const ccNum=el.querySelector('#cc-num');
  const ccName=el.querySelector('#cc-name');
  const ccExp=el.querySelector('#cc-exp');
  const ccCvv=el.querySelector('#cc-cvv');
  const btnPC=el.querySelector('#btn-pay-card');
  if(ccNum){
    ccNum.addEventListener('input',()=>{
      let v=ccNum.value.replace(/\D/g,'').slice(0,16);
      ccNum.value=v.replace(/(.{4})/g,'$1 ').trim();
      S.cardForm.num=ccNum.value;
    });
  }
  if(ccName){ccName.addEventListener('input',()=>{S.cardForm.name=ccName.value.toUpperCase();ccName.value=S.cardForm.name;});}
  if(ccExp){
    ccExp.addEventListener('input',()=>{
      let v=ccExp.value.replace(/\D/g,'').slice(0,4);
      if(v.length>2)v=v.slice(0,2)+'/'+v.slice(2);
      ccExp.value=v;S.cardForm.exp=v;
    });
  }
  if(ccCvv){
    ccCvv.addEventListener('focus',()=>{S.cvvFocus=true;const c=document.getElementById('pcard');if(c)c.classList.add('flip');});
    ccCvv.addEventListener('blur',()=>{S.cvvFocus=false;const c=document.getElementById('pcard');if(c)c.classList.remove('flip');});
    ccCvv.addEventListener('input',()=>{S.cardForm.cvv=ccCvv.value;});
  }
  if(btnPC){
    btnPC.addEventListener('click',()=>{
      btnPC.textContent='Processando...';btnPC.disabled=true;
      setTimeout(()=>nav('success'),1800);
    });
  }
}

// Boot
// favicon / ícone de atalho (símbolo da marca)
(function(){try{var l=document.createElement('link');l.rel='icon';l.type='image/png';l.href=LOGO_SYM;document.head.appendChild(l);var a=document.createElement('link');a.rel='apple-touch-icon';a.href=LOGO_SYM;document.head.appendChild(a);}catch(e){}})();
// efeito ripple ao toque em botões
document.addEventListener('pointerdown',function(e){
  const b=e.target&&e.target.closest&&e.target.closest('.btn');
  if(!b||b.disabled)return;
  const r=document.createElement('span');r.className='rpl';
  const rect=b.getBoundingClientRect();const size=Math.max(rect.width,rect.height);
  r.style.width=r.style.height=size+'px';
  r.style.left=(e.clientX-rect.left-size/2)+'px';
  r.style.top=(e.clientY-rect.top-size/2)+'px';
  b.appendChild(r);setTimeout(()=>{r.remove();},560);
},{passive:true});
if(SB){
  // link de recuperação de senha (vindo do e-mail) abre a tela de redefinição
  SB.auth.onAuthStateChange((event)=>{ if(event==='PASSWORD_RECOVERY'){ S.recovery=true; nav('reset-password'); } });
  SB.auth.getSession().then(({data})=>{ if(data&&data.session){ S.authed=true; const u=data.session.user; if(u){S.userEmail=(u.email||'').toLowerCase(); const m=u.user_metadata||{}; S.userCpf=_digits(m.cpf); S.userPhone=_digits(m.telefone); if(u.user_metadata)applyProfile(u.user_metadata);} } }).catch(()=>{});
}
window.addEventListener('offline',()=>{try{toast('Você está sem conexão. Algumas ações podem não funcionar.');}catch(e){}});
window.addEventListener('online',()=>{try{toast('Conexão restabelecida ✓');}catch(e){}});
let _onboarded=true; try{_onboarded=!!localStorage.getItem('vs_onboarded');}catch(e){}
nav('splash');
